name: Main Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8
        run: |
          flake8 || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python manage.py test --noinput

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./task-management-app
          file: ./task-management-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/task-app:latest
            ghcr.io/${{ github.repository }}/task-app:dev-${{ github.sha }}

  deploy-to-dev-environment:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    steps:
      - name: Announce deployment
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}/task-app:dev-${{ github.sha }}"

  deploy:
    name: Deploy to Render (optional)
    runs-on: ubuntu-latest
    needs: build-and-push
    # This job uses Render's API to trigger a deploy. Set the following repository secrets:
    # - RENDER_API_KEY: personal or service API key for Render
    # - RENDER_SERVICE_ID: the Render service id to deploy
    # - RENDER_SERVICE_URL (optional): the public URL for convenience
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_API_KEY or RENDER_SERVICE_ID is missing. Skipping deploy.";
            exit 0;
          fi
          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}'
          echo "If your Render service is configured to pull from GHCR, it should start deploying."
          if [ -n "$RENDER_SERVICE_URL" ]; then
            echo "App URL: $RENDER_SERVICE_URL"
          fi