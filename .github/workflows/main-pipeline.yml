name: Main Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8
        run: |
          flake8 || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python manage.py test --noinput

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Sanitize repo name
        shell: bash
        run: |
          SANITIZED_REPO="${GITHUB_REPOSITORY,,}"
          echo "SANITIZED_REPO=$SANITIZED_REPO" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./task-management-app
          file: ./task-management-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.SANITIZED_REPO }}/task-app:latest
            ghcr.io/${{ env.SANITIZED_REPO }}/task-app:dev-${{ github.sha }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      app_url: ${{ steps.set_output.outputs.app_url }}
    steps:
      - name: Trigger Render deploy
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::RENDER_API_KEY or RENDER_SERVICE_ID secret is not set."
            exit 1
          fi

          echo "Triggering deploy for Render service $RENDER_SERVICE_ID ..."

          http_code=$(curl --http1.1 -s -o /tmp/render_resp -w "%{http_code}" -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json" --data-raw '{"clearCache":"clear"}')

          echo "Render API response (HTTP $http_code):"
          cat /tmp/render_resp || true

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render deploy failed with HTTP $http_code"
            exit 1
          fi

          echo "Deploy triggered successfully."

          # prefer explicit service URL secret if provided, otherwise leave empty
          if [ -n "$RENDER_SERVICE_URL" ]; then
            echo "app_url=$RENDER_SERVICE_URL" >> /tmp/set_app_url
          else
            echo "app_url=" >> /tmp/set_app_url
          fi

      - name: Set output
        id: set_output
        run: |
          # read value written by previous step
          if [ -f /tmp/set_app_url ]; then
            cat /tmp/set_app_url
            APP_URL=$(cat /tmp/set_app_url | sed -n 's/^app_url=//p')
          else
            APP_URL=
          fi
          echo "::set-output name=app_url::$APP_URL"

  smoke:
    name: Smoke tests against Render
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Resolve RENDER_BASE_URL
        env:
          DEPLOY_APP_URL: ${{ needs.deploy.outputs.app_url }}
          SECRET_BASE: ${{ secrets.RENDER_BASE_URL }}
          SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -n "$SECRET_BASE" ]; then
            echo "Using secret RENDER_BASE_URL"
            echo "RENDER_BASE_URL=$SECRET_BASE" >> $GITHUB_ENV
          elif [ -n "$DEPLOY_APP_URL" ]; then
            echo "Using deploy output app_url"
            echo "RENDER_BASE_URL=$DEPLOY_APP_URL" >> $GITHUB_ENV
          elif [ -n "$SERVICE_URL" ]; then
            echo "Using service URL secret"
            echo "RENDER_BASE_URL=$SERVICE_URL" >> $GITHUB_ENV
          else
            echo "No base URL available"
            echo "RENDER_BASE_URL=" >> $GITHUB_ENV
          fi

      - name: Check home page responds with 200
        run: |
          if [ -z "$RENDER_BASE_URL" ]; then
            echo "RENDER_BASE_URL not set; skipping smoke tests."
            exit 0
          fi

          echo "Checking $RENDER_BASE_URL/"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_BASE_URL/")
          echo "Status code: $CODE"
          if [ "$CODE" -ne 200 ]; then
            echo "Home page did not return 200"
            exit 1
          fi

      - name: Check login page responds with 200
        run: |
          if [ -z "$RENDER_BASE_URL" ]; then
            echo "RENDER_BASE_URL not set; skipping smoke tests."
            exit 0
          fi

          echo "Checking $RENDER_BASE_URL/login"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_BASE_URL/login")
          echo "Status code: $CODE"
          if [ "$CODE" -ne 200 ]; then
            echo "Login page did not return 200"
            exit 1
          fi
