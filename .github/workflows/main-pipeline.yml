name: Main Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8
        run: |
          flake8 || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python manage.py test --noinput

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Sanitize repo name
        shell: bash
        run: |
          # docker repository names must be lowercase
          SANITIZED_REPO="${GITHUB_REPOSITORY,,}"
          echo "SANITIZED_REPO=$SANITIZED_REPO" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./task-management-app
          file: ./task-management-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.SANITIZED_REPO }}/task-app:latest
            ghcr.io/${{ env.SANITIZED_REPO }}/task-app:dev-${{ github.sha }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.app_url }}
    # Required secrets: RENDER_API_KEY, RENDER_SERVICE_ID
    # Required secret:  RENDER_SERVICE_URL  (your app's public URL, e.g. https://my-app.onrender.com)
    steps:
      - name: Trigger Render deploy
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::RENDER_API_KEY or RENDER_SERVICE_ID secret is not set."
            exit 1
          fi

          echo "Triggering deploy for Render service $RENDER_SERVICE_ID ..."

          # clearCache must be the string "clear" or "do_not_clear" (not a boolean)
          http_code=$(curl --http1.1 -s \
            -o /tmp/render_resp \
            -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            --data-raw '{"clearCache":"clear"}')

          echo "Render API response (HTTP $http_code):"
          cat /tmp/render_resp

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render deploy failed with HTTP $http_code"
            exit 1
          fi

          echo "Deploy triggered successfully."

          if [ -n "$RENDER_SERVICE_URL" ]; then
            echo "app_url=$RENDER_SERVICE_URL" >> "$GITHUB_OUTPUT"
            echo "App URL: $RENDER_SERVICE_URL"
          fi

      - name: Wait for deploy and verify app is reachable
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -z "$RENDER_SERVICE_URL" ]; then
            echo "RENDER_SERVICE_URL not set — skipping health check."
            exit 0
          fi
          echo "Waiting for Render to finish deploying (up to 3 min)..."
          for i in $(seq 1 18); do
            sleep 10
            http=$(curl --http1.1 -s -o /dev/null -w "%{http_code}" "$RENDER_SERVICE_URL" || true)
            echo "Attempt $i: HTTP $http"
            if [ "$http" -ge 200 ] && [ "$http" -lt 400 ]; then
              echo "App is live at $RENDER_SERVICE_URL"
              exit 0
            fi
          done
          echo "::warning::App did not respond with 2xx/3xx within 3 minutes. Check Render dashboard."
          exit 1