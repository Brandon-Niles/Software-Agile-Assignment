name: OWASP Smoke Scan

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r task-management-app/requirements.txt || true
          pip install bandit pytest

      - name: Apply migrations
        working-directory: task-management-app
        run: |
          python manage.py migrate --noinput

      - name: Run Django tests
        working-directory: task-management-app
        run: |
          pytest -q || python manage.py test

      - name: Trigger Render deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -e
          echo "Triggering Render deployment for service $RENDER_SERVICE_ID"
          resp=$(curl -s -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" -H "Authorization: Bearer ${RENDER_API_KEY}" -H "Content-Type: application/json" -d '{}')
          echo "$resp" > render_deploy_response.json
          deploy_id=$(python -c "import json;print(json.load(open('render_deploy_response.json')).get('id',''))")
          echo "deploy_id=$deploy_id"
          echo "DEPLOY_ID=$deploy_id" >> $GITHUB_ENV

      - name: Wait for deployed site to become healthy
        env:
          DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_URL }}
        run: |
          set -e
          if [ -z "${DEPLOY_URL}" ]; then
            echo "RENDER_DEPLOY_URL secret is not set" >&2
            exit 1
          fi
          echo "Waiting for ${DEPLOY_URL} to return HTTP 200"
          for i in {1..60}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Service is up"
              exit 0
            fi
            echo "Attempt $i: status=$status"
            sleep 5
          done
          echo "Service did not become available in time" >&2
          cat render_deploy_response.json || true
          exit 1

      - name: Run Bandit (static analysis)
        run: |
          bandit -r task-management-app -f json -o bandit_report.json || true

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.8.0
        with:
          target: ${{ secrets.RENDER_DEPLOY_URL }}

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit_report.json
            zap_report.html
