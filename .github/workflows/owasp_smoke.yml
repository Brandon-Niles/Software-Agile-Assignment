name: OWASP Smoke Scan

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r task-management-app/requirements.txt || true
          pip install bandit pytest

      - name: Apply migrations
        working-directory: task-management-app
        run: |
          python manage.py migrate --noinput

      - name: Run Django tests
        working-directory: task-management-app
        run: |
          pytest -q || python manage.py test

      - name: Start Django development server
        working-directory: task-management-app
        run: |
          # start server in background and capture logs
          python manage.py runserver 0.0.0.0:8000 &>/tmp/server.log &
          # wait for server to become available
          for i in {1..30}; do curl -sSf http://127.0.0.1:8000 && break || sleep 1; done

      - name: Run Bandit (static analysis)
        run: |
          bandit -r task-management-app -f json -o bandit_report.json || true

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.8.0
        with:
          target: 'http://127.0.0.1:8000'

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit_report.json
            zap_report.html
