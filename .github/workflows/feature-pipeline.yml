name: Feature Pipeline

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    if: ${{ github.event_name == 'push' || startsWith(github.head_ref, 'feature/') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8
        run: |
          flake8 || true

  test:
    if: ${{ github.event_name == 'push' || startsWith(github.head_ref, 'feature/') }}
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: task-management-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python manage.py test --noinput

  build-and-push:
    if: ${{ github.event_name == 'push' || startsWith(github.head_ref, 'feature/') }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Sanitize branch name
        shell: bash
        run: |
          # strip refs/heads/ and replace slashes with hyphens
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          SANITIZED=$(echo "$BRANCH_NAME" | tr '/' '-')
          echo "SANITIZED_REF_NAME=$SANITIZED" >> $GITHUB_ENV
          # lowercase the repository name for Docker image tags
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./task-management-app
          file: ./task-management-app/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/task-app:feature-${{ env.SANITIZED_REF_NAME }}-${{ github.sha }}