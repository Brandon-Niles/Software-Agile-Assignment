<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task — Task Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #050d1a;
            color: #e6f1ff;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 3rem 1rem 2rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(100,255,218,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,255,218,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
        .form-card {
            background: #0f2235;
            border: 1px solid #1e3a5a;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            position: relative;
        }
        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100,255,218,0.4), transparent);
        }
        .form-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .form-header-icon {
            width: 38px; height: 38px;
            background: rgba(100,255,218,0.1);
            border: 1px solid rgba(100,255,218,0.25);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: #64ffda; flex-shrink: 0;
        }
        .form-header h1 { font-size: 1.25rem; font-weight: 700; }
        .form-header .task-id { font-size: 0.8rem; color: #8892b0; margin-top: 0.1rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 0.4rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.68em 1em;
            background: #0a192f;
            color: #e6f1ff;
            border: 1px solid #1e3a5a;
            border-radius: 8px;
            font-size: 0.92rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #64ffda;
            box-shadow: 0 0 0 3px rgba(100,255,218,0.15);
        }
        .form-group select option { background: #0a192f; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
        .action-btns {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.75rem;
        }
        .btn-primary {
            flex: 1;
            padding: 0.72em;
            background: #64ffda;
            color: #050d1a;
            border: none;
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-secondary {
            flex: 1;
            padding: 0.72em;
            background: transparent;
            color: #8892b0;
            border: 1px solid #1e3a5a;
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-secondary:hover { background: #162d47; color: #e6f1ff; border-color: #243e5e; }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="form-header">
            <div class="form-header-icon">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </div>
            <div>
                <h1>Edit Task</h1>
                <div class="task-id">#{{ task.id }}</div>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" name="title" id="title" value="{{ task.title }}" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="platform">Platform</label>
                    <input type="text" name="platform" id="platform" value="{{ task.platform }}" required>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" name="location" id="location" value="{{ task.location }}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="status">Status</label>
                    <select name="status" id="status" required>
                        <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Running" {% if task.status == 'Running' %}selected{% endif %}>Running</option>
                        <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                        <option value="Failed" {% if task.status == 'Failed' %}selected{% endif %}>Failed</option>
                        <option value="Cancelled" {% if task.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="retries">Retries</label>
                    <input type="number" name="retries" id="retries" value="{{ task.retries }}" min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="start_time">Start Time</label>
                    <input type="text" name="start_time" id="start_time" value="{{ task.start_time }}" required>
                </div>
                <div class="form-group">
                    <label for="end_time">End Time</label>
                    <input type="text" name="end_time" id="end_time" value="{{ task.end_time }}">
                </div>
            </div>
            <div class="action-btns">
                <button type="submit" class="btn-primary">Save Changes</button>
                <a href="{% url 'task_list' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
