<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Task Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #050d1a;
            color: #e6f1ff;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(100,255,218,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,255,218,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
        .auth-card {
            background: #0f2235;
            border: 1px solid #1e3a5a;
            border-radius: 16px;
            padding: 2.75rem 2.5rem 2.25rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            position: relative;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100,255,218,0.4), transparent);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.75rem;
        }
        .auth-logo-icon {
            width: 40px; height: 40px;
            background: rgba(100,255,218,0.1);
            border: 1px solid rgba(100,255,218,0.25);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #64ffda;
        }
        .auth-logo-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: #e6f1ff;
            letter-spacing: 0.3px;
        }
        .auth-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: #e6f1ff;
            margin-bottom: 0.35rem;
        }
        .auth-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 0.45rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.7em 1em;
            background: #0a192f;
            color: #e6f1ff;
            border: 1px solid #1e3a5a;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: #64ffda;
            box-shadow: 0 0 0 3px rgba(100,255,218,0.15);
        }
        .form-group input::placeholder { color: #4a5568; }
        .error-msg {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,83,112,0.1);
            border: 1px solid rgba(255,83,112,0.25);
            color: #ff5370;
            border-radius: 8px;
            padding: 0.65em 1em;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
        }
        .submit-btn {
            width: 100%;
            padding: 0.75em;
            background: #64ffda;
            color: #050d1a;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.15s;
        }
        .submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #8892b0;
        }
        .auth-footer a { color: #64ffda; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        .success-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(5,13,26,0.88);
            display: flex; align-items: center; justify-content: center;
        }
        .success-card {
            background: #0f2235;
            border: 1px solid rgba(100,255,218,0.2);
            padding: 2.25rem 2.5rem;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            max-width: 320px;
        }
        .success-card .check-icon {
            width: 52px; height: 52px;
            background: rgba(100,255,218,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem; color: #64ffda;
        }
        .success-card h3 { color: #64ffda; margin-bottom: 0.5rem; font-size: 1.1rem; }
        .success-card p  { color: #8892b0; font-size: 0.88rem; margin-bottom: 1.5rem; }
        .success-card button {
            background: #64ffda; color: #050d1a; border: none; border-radius: 8px;
            padding: 0.6em 1.6em; font-weight: 700; font-family: inherit; cursor: pointer;
        }
        .success-card button:hover { opacity: 0.88; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
            </div>
            <span class="auth-logo-text">TaskManager</span>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        {% if error %}
            <div class="error-msg">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
        {% endif %}

        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one</a>
        </div>
    </div>
    {% if request.GET.registered %}
    <div id="register-success-popup" class="success-overlay">
        <div class="success-card">
            <div class="check-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h3>Registration Successful!</h3>
            <p>Your account has been created.<br>Sign in with your credentials below.</p>
            <button onclick="document.getElementById('register-success-popup').style.display='none';">Continue</button>
        </div>
    </div>
    {% endif %}
</body>
</html>
