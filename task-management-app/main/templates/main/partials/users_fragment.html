<div class="page-header"><h1>Users</h1><p>Manage system users (admin only).</p></div>
<div class="table-wrap">
    <table>
        <thead><tr><th>Username</th><th>Email</th><th>Joined</th></tr></thead>
        <tbody>
            {% for u in users %}
                <tr><td>{{ u.username }}</td><td>{{ u.email }}</td><td>{{ u.date_joined }}</td></tr>
            {% empty %}
                <tr><td colspan="3">No users</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
