<div class="page-header"><h1>Settings</h1><p>Application settings and theme toggle.</p></div>
<div style="background:var(--bg-card);border:1px solid var(--border);padding:1rem;border-radius:10px;max-width:560px;">
	<div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
		<div>
			<div style="font-weight:700;color:var(--text-primary)">Simulate live tasks</div>
			<div style="font-size:0.9rem;color:var(--text-secondary)">When enabled, the dashboard will animate task state changes for demo purposes (no DB changes).</div>
		</div>
		<div>
			<label style="display:inline-flex;align-items:center;gap:0.5rem;cursor:pointer">
				<input id="simulate-toggle" type="checkbox">
				<span id="simulate-label" style="color:var(--text-secondary)">Off</span>
			</label>
		</div>
	</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
	const toggle = document.getElementById('simulate-toggle');
	const label = document.getElementById('simulate-label');
	const key = 'simulateLive';
	const saved = localStorage.getItem(key) === '1';
	toggle.checked = saved; label.textContent = saved? 'On' : 'Off';
	// if enabled and dashboard already loaded, start simulation
	if(saved){ const panel = document.getElementById('tab-dashboard'); if(panel && typeof startSimulation==='function') startSimulation(panel); }
	toggle.addEventListener('change', function(){
		const on = toggle.checked;
		localStorage.setItem(key, on? '1':'0');
		label.textContent = on? 'On':'Off';
		// if dashboard panel loaded, start/stop simulation
		const panel = document.getElementById('tab-dashboard');
		if(panel){ if(on){ if(typeof startSimulation==='function') startSimulation(panel); } else { if(typeof stopSimulation==='function') stopSimulation(panel); } }
	});
});
</script>
