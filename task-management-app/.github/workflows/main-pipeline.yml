name: Main Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8
        run: |
          flake8 || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python manage.py test --noinput

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/task-app:latest
            ghcr.io/${{ github.repository }}/task-app:dev-${{ github.sha }}

  deploy-to-dev-environment:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    steps:
      - name: Announce deployment
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}/task-app:dev-${{ github.sha }}"
      - name: Deploy to remote host via SSH
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            IMAGE=ghcr.io/${{ github.repository }}/task-app:dev-${{ github.sha }}
            echo "Pulling image $IMAGE"
            docker pull $IMAGE
            echo "Stopping existing container (if any)"
            docker rm -f task-app || true
            echo "Starting container"
            docker run -d --name task-app --restart unless-stopped -p 80:8000 $IMAGE
      - name: Register deployment URL in GitHub
        if: ${{ secrets.DEPLOY_URL != '' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const ref = process.env.GITHUB_SHA || context.sha
            const env = 'dev'
            const url = process.env.DEPLOY_URL
            const dep = await github.rest.repos.createDeployment({
              owner, repo, ref, environment: env, required_contexts: []
            })
            await github.rest.repos.createDeploymentStatus({
              owner, repo, deployment_id: dep.data.id, state: 'success', environment_url: url
            })
            core.notice(`Registered deployment URL: ${url}`)
